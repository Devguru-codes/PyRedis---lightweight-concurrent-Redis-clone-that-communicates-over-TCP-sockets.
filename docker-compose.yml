services:
  pyredis:
    build: .
    container_name: pyredis-server
    ports:
      - "6380:6380"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 6380), timeout=2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10

  loadtest-a:
    build: .
    depends_on:
      pyredis:
        condition: service_healthy
    command: ["python", "scripts/stress_client.py", "--host", "pyredis", "--port", "6380", "--requests", "200", "--concurrency", "40"]

  loadtest-b:
    build: .
    depends_on:
      pyredis:
        condition: service_healthy
    command: ["python", "scripts/stress_client.py", "--host", "pyredis", "--port", "6380", "--requests", "200", "--concurrency", "40"]
