name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Stress test
        run: |
          python -m pyredis --host 127.0.0.1 --port 6380 &
          SERVER_PID=$!
          sleep 2
          python scripts/stress_client.py --host 127.0.0.1 --port 6380 --requests 300 --concurrency 50 --p95-threshold-ms 150
          kill $SERVER_PID
